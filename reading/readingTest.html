<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Reading Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .font-jp { font-family: "Noto Sans JP", sans-serif; }
    </style>
    <script src="../header.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="selection-page" class="flex flex-col h-screen p-6 max-w-md mx-auto justify-center gap-3">
        <div class="text-center mb-4">
            <h1 class="text-2xl font-bold text-slate-800">JLPT Reading Test</h1>
            <p class="text-slate-500">Choose your level to begin</p>
        </div>

        <!-- Saved Progress Banner -->
        <div id="resume-banner" class="hidden bg-indigo-50 border border-indigo-200 rounded-2xl p-4 flex items-center justify-between gap-3">
            <div>
                <p class="text-xs font-bold text-indigo-700 uppercase tracking-wide">Saved Progress</p>
                <p id="resume-info" class="text-sm text-indigo-600 mt-0.5"></p>
            </div>
            <div class="flex gap-2 shrink-0">
                <button onclick="resumeProgress()" class="text-xs font-bold bg-indigo-600 text-white px-3 py-1.5 rounded-lg hover:bg-indigo-700 transition-colors">Resume</button>
                <button onclick="clearProgress()" class="text-xs font-bold bg-white text-slate-500 px-3 py-1.5 rounded-lg border border-slate-200 hover:bg-slate-100 transition-colors">Clear</button>
            </div>
        </div>

        <button onclick="startTest('N5')" class="flex items-center bg-white border border-slate-200 rounded-2xl p-4 shadow-sm active:scale-95 transition-all">
            <div class="w-12 h-12 rounded-xl bg-emerald-500 flex items-center justify-center text-white font-bold">N5</div>
            <span class="ml-4 font-bold text-slate-700">Level N5</span>
            <span id="badge-N5" class="ml-auto hidden text-[10px] font-bold bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full"></span>
        </button>

        <button onclick="startTest('N4')" class="flex items-center bg-white border border-slate-200 rounded-2xl p-4 shadow-sm active:scale-95 transition-all">
            <div class="w-12 h-12 rounded-xl bg-sky-500 flex items-center justify-center text-white font-bold">N4</div>
            <span class="ml-4 font-bold text-slate-700">Level N4</span>
            <span id="badge-N4" class="ml-auto hidden text-[10px] font-bold bg-sky-100 text-sky-700 px-2 py-0.5 rounded-full"></span>
        </button>

        <button onclick="startTest('N3')" class="flex items-center bg-white border border-slate-200 rounded-2xl p-4 shadow-sm active:scale-95 transition-all">
            <div class="w-12 h-12 rounded-xl bg-amber-500 flex items-center justify-center text-white font-bold">N3</div>
            <span class="ml-4 font-bold text-slate-700">Level N3</span>
            <span id="badge-N3" class="ml-auto hidden text-[10px] font-bold bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full"></span>
        </button>

        <button onclick="startTest('N2')" class="flex items-center bg-white border border-slate-200 rounded-2xl p-4 shadow-sm active:scale-95 transition-all">
            <div class="w-12 h-12 rounded-xl bg-orange-500 flex items-center justify-center text-white font-bold">N2</div>
            <span class="ml-4 font-bold text-slate-700">Level N2</span>
            <span id="badge-N2" class="ml-auto hidden text-[10px] font-bold bg-orange-100 text-orange-700 px-2 py-0.5 rounded-full"></span>
        </button>

        <button onclick="startTest('N1')" class="flex items-center bg-white border border-slate-200 rounded-2xl p-4 shadow-sm active:scale-95 transition-all">
            <div class="w-12 h-12 rounded-xl bg-red-600 flex items-center justify-center text-white font-bold">N1</div>
            <span class="ml-4 font-bold text-slate-700">Level N1</span>
            <span id="badge-N1" class="ml-auto hidden text-[10px] font-bold bg-red-100 text-red-700 px-2 py-0.5 rounded-full"></span>
        </button>
    </div>

    <div id="test-container" class="hidden min-h-screen flex flex-col">
        <header class="p-4 bg-white border-b sticky top-0 z-20 flex justify-between items-center shadow-sm">
            <span id="display-level" class="font-bold text-indigo-600 text-lg uppercase tracking-tight"></span>
            <button onclick="location.reload()" class="text-xs font-bold bg-slate-100 text-slate-500 px-3 py-1 rounded-full uppercase hover:bg-slate-200">Exit Test</button>
        </header>

        <div id="app" class="max-w-4xl mx-auto p-4 md:p-6 space-y-6 w-full">
            <div id="test-loading" class="flex flex-col items-center justify-center py-20 text-indigo-500">
                <svg class="animate-spin h-10 w-10 mb-4" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <p class="text-xl font-semibold animate-pulse">Loading Dokkai Data...</p>
            </div>
        </div>
    </div>

    <script>
        // GLOBAL STATE
        let quizArray = [];
        let currentIndex = 0;
        let selectedOptionId = null;
        let hasSubmitted = false;
        let currentLevel = null;

        // ─── STORAGE HELPERS ───────────────────────────────────────────────────────

        const STORAGE_KEY = 'jlpt_reading_progress';

        function saveProgress() {
            try {
                const allProgress = loadAllProgress();
                allProgress[currentLevel] = {
                    level: currentLevel,
                    questionIndex: currentIndex,
                    savedAt: new Date().toISOString()
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(allProgress));
            } catch (e) { /* storage unavailable */ }
        }

        function loadAllProgress() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            } catch (e) { return {}; }
        }

        function getLevelProgress(level) {
            return loadAllProgress()[level] || null;
        }

        function clearLevelProgress(level) {
            try {
                const all = loadAllProgress();
                delete all[level];
                localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
            } catch (e) { /* storage unavailable */ }
        }

        function clearProgress() {
            try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
            document.getElementById('resume-banner').classList.add('hidden');
            ['N5','N4','N3','N2','N1'].forEach(lvl => {
                const badge = document.getElementById(`badge-${lvl}`);
                if (badge) badge.classList.add('hidden');
            });
        }

        function resumeProgress() {
            // Find the most recently saved level
            const all = loadAllProgress();
            let latest = null;
            for (const lvl of Object.keys(all)) {
                if (!latest || all[lvl].savedAt > all[latest].savedAt) latest = lvl;
            }
            if (latest) startTest(latest, all[latest].questionIndex);
        }

        function initSelectionPage() {
            const all = loadAllProgress();
            const levels = Object.keys(all);

            // Show per-level badges
            levels.forEach(lvl => {
                const badge = document.getElementById(`badge-${lvl}`);
                if (badge) {
                    badge.textContent = `Q${all[lvl].questionIndex + 1} saved`;
                    badge.classList.remove('hidden');
                }
            });

            // Show resume banner for most recent save
            if (levels.length > 0) {
                let latest = levels[0];
                levels.forEach(lvl => { if (all[lvl].savedAt > all[latest].savedAt) latest = lvl; });
                const d = new Date(all[latest].savedAt);
                const timeStr = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                document.getElementById('resume-info').textContent =
                    `${latest} Reading — Q${all[latest].questionIndex + 1} · ${timeStr}`;
                document.getElementById('resume-banner').classList.remove('hidden');
            }
        }

        // ─── ORIGINAL FUNCTIONS (unchanged) ────────────────────────────────────────

        async function startTest(level, resumeIndex = 0) {
            currentLevel = level;

            // UI Transition
            document.getElementById('selection-page').classList.add('hidden');
            document.getElementById('test-container').classList.remove('hidden');
            document.getElementById('display-level').innerText = level + " Reading";

            try {
                const response = await fetch(`${level}Reading.json`);
                if (!response.ok) throw new Error('File not found');
                
                quizArray = await response.json();
                
                if (quizArray && quizArray.length > 0) {
                    currentIndex = resumeIndex;
                    renderUI();
                } else {
                    throw new Error('JSON is empty');
                }
                
            } catch (error) {
                document.getElementById('app').innerHTML = `
                    <div class="text-red-500 text-center mt-10 bg-red-50 p-6 rounded-xl border border-red-100">
                        <p class="font-bold">Error loading ${level}Reading.json</p>
                        <p class="text-sm">Make sure the file exists in the same folder as this HTML.</p>
                        <button onclick="location.reload()" class="mt-4 text-xs underline">Go Back</button>
                    </div>`;
            }
        }

        function renderUI() {
            const app = document.getElementById('app');
            const quizData = quizArray[currentIndex];
            
            selectedOptionId = null;
            hasSubmitted = false;

            // Save progress whenever a question is rendered
            saveProgress();

            app.innerHTML = `
<header class="space-y-4 border-b border-slate-200 pb-6 fade-in">
    
    <!-- Top Bar -->
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold text-slate-800 tracking-tight">
            読解 <span class="text-indigo-600">Analysis</span>
        </h1>

        <span class="bg-indigo-100 text-indigo-700 text-[10px] px-3 py-1 rounded-full font-bold uppercase">
            Level: ${quizData.level} | ${quizData.topic}
        </span>
    </div>

    <!-- Scrollable Pagination -->
    <div id="pagination-container"
         class="flex gap-2 overflow-x-auto pb-1">

        ${quizArray.map((_, index) => `
            <button 
                onclick="goToQuestion(${index})"
                class="w-9 h-9 shrink-0 rounded-lg font-bold flex items-center justify-center border-2 transition-all duration-200
                ${index === currentIndex 
                    ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' 
                    : 'bg-white border-slate-200 text-slate-500 hover:border-indigo-400 hover:text-indigo-600'}
                ">
                ${index + 1}
            </button>
        `).join('')}

    </div>
</header>

                <div class="bg-white md:p-6 rounded-2xl shadow-sm border border-slate-200 fade-in">
                    <h3 class="text-xs font-bold text-slate-400 m-3 uppercase tracking-wider">Passage</h3>
                    <p class="text-slate-800 leading-loose text-md mb-1 font-jp bg-slate-50 p-3 rounded-xl border border-slate-100">
                        ${quizData.content.text}
                    </p>
                    
                    <div class="border border-slate-200 rounded-xl overflow-hidden">
                        <button onclick="toggleTranslation()" class="w-full bg-slate-50 hover:bg-slate-100 text-slate-600 font-semibold py-3 px-5 flex justify-between items-center transition-colors">
                            <span class="text-sm flex items-center gap-2">Show Burmese:  Translation</span>
                            <svg id="trans-icon" class="w-4 h-4 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>
                        <div id="translation-content" class="hidden border-t border-slate-200 bg-white p-5 text-slate-700 leading-relaxed text-sm">
                            ${quizData.content.translation}
                        </div>
                    </div>
                </div>

                <div class="bg-white p-5 md:p-8 rounded-2xl shadow-sm border border-slate-200 fade-in">
                    <h2 class="text-lg font-bold text-slate-800 mb-6 font-jp">問い： ${quizData.question.query}</h2>
                    <div class="space-y-3" id="options-container">
                        ${quizData.question.options.map(opt => `
                            <button onclick="selectOption(${opt.id})" id="option-${opt.id}" 
                                class="w-full text-left p-4 rounded-xl border-2 border-slate-100 hover:border-indigo-200 hover:bg-indigo-50/50 transition-all font-jp group">
                                <div class="flex items-start gap-3">
                                    <span class="badge w-7 h-7 shrink-0 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center font-bold text-sm group-hover:bg-indigo-100">
                                        ${opt.id}
                                    </span> 
                                    <span class="pt-0.5 text-slate-700">${opt.text}</span>
                                </div>
                            </button>
                        `).join('')}
                    </div>
                    <button id="submit-btn" onclick="checkAnswer()" disabled 
                        class="mt-8 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl disabled:opacity-40 transition-all">
                        Check Answer
                    </button>
                </div>

                <div id="ai-feedback" class="hidden fade-in"></div>
            `;
        }

        window.goToQuestion = function(index) {
            currentIndex = index;
            renderUI();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.toggleTranslation = function() {
            const content = document.getElementById('translation-content');
            const icon = document.getElementById('trans-icon');
            content.classList.toggle('hidden');
            icon.classList.toggle('rotate-180');
        }

        window.selectOption = function(id) {
            if (hasSubmitted) return;
            selectedOptionId = id;
            
            document.querySelectorAll('#options-container button').forEach(btn => {
                btn.classList.remove('border-indigo-500', 'bg-indigo-50', 'ring-4', 'ring-indigo-100');
                btn.querySelector('.badge').classList.remove('bg-indigo-600', 'text-white');
            });
            
            const selectedBtn = document.getElementById(`option-${id}`);
            selectedBtn.classList.add('border-indigo-500', 'bg-indigo-50', 'ring-4', 'ring-indigo-100');
            selectedBtn.querySelector('.badge').classList.add('bg-indigo-600', 'text-white');
            
            document.getElementById('submit-btn').disabled = false;
        }

        window.checkAnswer = function() {
            hasSubmitted = true;
            const quizData = quizArray[currentIndex];
            const correctId = quizData.question.correct_answer;
            const isCorrect = selectedOptionId === correctId;
            
            document.getElementById('submit-btn').classList.add('hidden');
            
            const selectedBtn = document.getElementById(`option-${selectedOptionId}`);
            const correctBtn = document.getElementById(`option-${correctId}`);

            if (isCorrect) {
                selectedBtn.classList.add('border-emerald-500', 'bg-emerald-50');
                selectedBtn.querySelector('.flex').innerHTML += `<span class="ml-auto text-emerald-600 font-bold">✓ မှန်ပါတယ်</span>`;
            } else {
                selectedBtn.classList.add('border-rose-500', 'bg-rose-50');
                selectedBtn.querySelector('.badge').classList.replace('bg-indigo-600', 'bg-rose-600');
                selectedBtn.querySelector('.flex').innerHTML += `<span class="ml-auto text-rose-600 font-bold">✗ မှားပါတယ်</span>`;
                
                correctBtn.classList.add('border-emerald-500', 'bg-emerald-50');
                correctBtn.querySelector('.badge').classList.add('bg-emerald-600', 'text-white');
            }

            renderAIFeedback(quizData.ai_style_framework);
        }

        function renderAIFeedback(ai) {
            const feedbackContainer = document.getElementById('ai-feedback');
            feedbackContainer.innerHTML = `
                <div class="bg-slate-900 text-white p-6 md:p-10 rounded-2xl shadow-xl mt-8 border border-slate-800">
                    <h2 class="text-2xl font-bold mb-8 border-b border-slate-800 pb-4 flex items-center gap-3">
                        <span class="text-blue-400">AI</span> Analysis
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700">
                            <h3 class="text-blue-400 font-bold mb-3">🔍 ${ai.attention.title}</h3>
                            <ul class="text-xs text-slate-300 space-y-2 leading-relaxed">${ai.attention.points.map(p => `<li>• ${p}</li>`).join('')}</ul>
                        </div>
                        <div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700">
                            <h3 class="text-purple-400 font-bold mb-3">🎯 ${ai.intent.title}</h3>
                            <p class="text-xs text-slate-300 leading-relaxed">${ai.intent.description}</p>
                        </div>
                        <div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700">
                            <h3 class="text-amber-400 font-bold mb-3">💡 ${ai.concept.title}</h3>
                            <div class="inline-block px-2 py-0.5 rounded bg-amber-500/10 text-amber-300 text-[10px] font-bold uppercase mb-2">${ai.concept.key_term}</div>
                            <p class="text-xs text-slate-300 leading-relaxed">${ai.concept.explanation}</p>
                        </div>
                        <div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700">
                            <h3 class="text-emerald-400 font-bold mb-3">🌉 ${ai.analogy.title}</h3>
                            <p class="text-xs text-white font-semibold mb-2">${ai.analogy.scenario}</p>
                            <p class="text-[11px] italic text-slate-400 border-l-2 border-emerald-500/50 pl-3">${ai.analogy.comparison}</p>
                        </div>
                    </div>
                </div>
            `;
            feedbackContainer.classList.remove('hidden');
            setTimeout(() => feedbackContainer.scrollIntoView({ behavior: 'smooth' }), 300);
        }

        // ─── INIT ───────────────────────────────────────────────────────────────────
        initSelectionPage();
    </script>
</body>
</html>
