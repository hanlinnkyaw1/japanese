<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT Practice Portal</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Add inside <head> -->
    <meta name="description" content="JLPT Practice Test - Take free JLPT mock exams for N5, N4, N3, N2, N1 levels. Practice vocabulary, grammar, and reading with Burmese explanations. Perfect for Myanmar learners preparing for JLPT." />
    <meta name="keywords" content="JLPT Practice Test, JLPT Mock Exam, JLPT N5, JLPT N4, JLPT N3, JLPT N2, JLPT N1, JLPT Myanmar, JLPT Burmese, Japanese Test, JLPT Vocabulary, JLPT Grammar, JLPT Reading, ဗမာစာ, ဗမာလူများအတွက်, JLPT စာမေးပွဲ, JLPT စမ်းသပ်မှု" />
    <meta name="language" content="my" />
    <meta property="og:title" content="JLPT Practice Test" />
    <meta property="og:description" content="Take JLPT mock tests for all levels. Practice vocabulary, grammar, and reading to prepare for the JLPT exam." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.jlptburmese.com/JLPTtest/test.html" />
    <meta property="og:image" content="https://www.jlptburmese.com/favicon.ico" />
    <meta property="og:locale" content="my_MM" />
    <title>JLPT Practice Test</title>
    <link rel="stylesheet" href="../output.css">
    <script src="navbar.js"></script>
    <style>
        /* --- 1. Global Reset & Variables --- */
        :root {
            --primary-color: #4f46e5; /* Indigo */
            --primary-hover: #4338ca;
            --accent-color: #f3f4f6;
            --text-dark: #1f2937;
            --text-light: #6b7280;
            --bg-linear: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-linear);
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* --- 2. Main Card Container --- */
        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            width: 100%;
            max-width: 500px;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        h1 {
            color: var(--text-dark);
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }

        p.subtitle {
            color: var(--text-light);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        /* --- 3. Form Sections --- */
        .section-title {
            text-align: left;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-light);
            margin-bottom: 10px;
            margin-top: 20px;
        }

        /* --- 4. Custom Radio Buttons (The "Cards") --- */
        .options-grid {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .options-grid.full-width {
            flex-direction: column;
        }

        /* Hide the actual radio input circle */
        input[type="radio"] {
            display: none;
        }

        /* Style the label to look like a button */
        .choice-label {
            background: var(--accent-color);
            color: var(--text-dark);
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            border: 2px solid transparent;
            flex: 1;
            min-width: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Hover Effect */
        .choice-label:hover {
            background: #e5e7eb;
            transform: translateY(-2px);
        }

        /* Selected State */
        input[type="radio"]:checked + .choice-label {
            background: #eef2ff;
            border-color: var(--primary-color);
            color: var(--primary-color);
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }

        /* --- 5. Action Button --- */
        .start-btn {
            margin-top: 30px;
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .start-btn:hover {
            background-color: var(--primary-hover);
        }

        .start-btn:active {
            transform: scale(0.98);
        }

        /* --- 6. Error Message --- */
        #error-msg {
            color: #ef4444;
            font-size: 0.9rem;
            margin-top: 15px;
            display: none; /* Hidden by default */
            font-weight: 500;
        }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>JLPT Old Questions</h1>
        <p class="subtitle">Select your level and category to begin.</p>

        <div class="section-title">Select Level</div>
        <div class="options-grid">
            <input type="radio" id="n1" name="level" value="N1">
            <label for="n1" class="choice-label">N1</label>

            <input type="radio" id="n2" name="level" value="N2">
            <label for="n2" class="choice-label">N2</label>

            <input type="radio" id="n3" name="level" value="N3">
            <label for="n3" class="choice-label">N3</label>

            <input type="radio" id="n4" name="level" value="N4">
            <label for="n4" class="choice-label">N4</label>

            <input type="radio" id="n5" name="level" value="N5">
            <label for="n5" class="choice-label">N5</label>
        </div>

        <div class="section-title">Select Type</div>
        <div class="options-grid full-width">
            <input type="radio" id="mojigoi" name="type" value="MojiGoi">
            <label for="mojigoi" class="choice-label">
                Vocabulary & Grammar (文字・語彙)
            </label>

            <input type="radio" id="reading" name="type" value="Reading">
            <label for="reading" class="choice-label">
                Reading (読解)
            </label>
        </div>

        <div id="error-msg">Please select both a Level and a Type.</div>

        <button class="start-btn" onclick="startTest()">Start Practice</button>
    </div>

    <script>
        function startTest() {
            // 1. Get all radio buttons with name 'level' and 'type'
            const levels = document.getElementsByName('level');
            const types = document.getElementsByName('type');
            const errorMsg = document.getElementById('error-msg');

            let selectedLevel = null;
            let selectedType = null;

            // 2. Loop to find which Level is checked
            for (let i = 0; i < levels.length; i++) {
                if (levels[i].checked) {
                    selectedLevel = levels[i].value;
                    break;
                }
            }

            // 3. Loop to find which Type is checked
            for (let i = 0; i < types.length; i++) {
                if (types[i].checked) {
                    selectedType = types[i].value;
                    break;
                }
            }

            // 4. Validation: Check if user missed a selection
            if (!selectedLevel || !selectedType) {
                // Show error message
                errorMsg.style.display = 'block';
                // Shake animation effect (optional visual cue)
                const btn = document.querySelector('.start-btn');
                btn.style.transform = "translateX(5px)";
                setTimeout(() => btn.style.transform = "translateX(0)", 100);
                setTimeout(() => btn.style.transform = "translateX(-5px)", 200);
                setTimeout(() => btn.style.transform = "translateX(0)", 300);
                return; 
            }

            // 5. Hide error if valid
            errorMsg.style.display = 'none';

            // 6. Construct URL and Redirect
            // Example result: "N1MojiGoi.html" or "N3Reading.html"
            const targetUrl = selectedLevel + selectedType + ".html";
            
            // Console log for debugging (you can remove this)
            console.log("Redirecting to: " + targetUrl);

            // Perform the redirection
            window.location.href = targetUrl;
        }
    </script>

</body>
</html>
