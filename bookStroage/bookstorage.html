    const tbody = document.querySelector("#book-table tbody");

    let currentFilter = "all";
    let currentSearch = "";

  function getLevel(title) {
  const T = title.toUpperCase();
  if (T.includes("N1")) return "N1";
  if (T.includes("N2")) return "N2";
  if (T.includes("N3")) return "N3";
  if (T.includes("N4")) return "N4";
  if (T.includes("N5")) return "N5";
  return "General";
}

// Detect "Old Question" independently of the N-level
function isOldQuestion(title) {
  const t = title.toLowerCase();

  return t.includes("old question")
}


    function createRow(book) {
      const tr = document.createElement("tr");

      const tdTitle = document.createElement("td");
      tdTitle.textContent = book.title;

      const tdDownload = document.createElement("td");
      const btn = document.createElement("a");
      btn.href = book.link;
      btn.target = "_blank";
      btn.rel = "noopener noreferrer";
      btn.className = "download-btn";
      btn.textContent = "Download";

      tdDownload.appendChild(btn);
      tr.appendChild(tdTitle);
      tr.appendChild(tdDownload);

      return tr;
    }

    function renderBooks(bookList) {
      tbody.innerHTML = "";
      if (bookList.length === 0) {
        tbody.innerHTML = `<tr><td colspan="2">No books found</td></tr>`;
        return;
      }
      bookList.forEach(book => {
        tbody.appendChild(createRow(book));
      });
    }
    
    function applyFilters() {
  let filtered = books;

  // search filter
  if (currentSearch.trim() !== "") {
    const q = currentSearch.toLowerCase();
    filtered = filtered.filter(b => b.title.toLowerCase().includes(q));
  }

  // level / category filter
  if (currentFilter !== "all") {
    if (currentFilter === "Old Question") {
      filtered = filtered.filter(b => isOldQuestion(b.title));
    } else if (currentFilter === "General") {
      filtered = filtered.filter(b => !isOldQuestion(b.title) && getLevel(b.title) === "General");
    } else {
      // N1..N5
      filtered = filtered.filter(b => getLevel(b.title) === currentFilter);
    }
  }

  renderBooks(filtered);
}


    // search input listener
    searchInput.addEventListener("input", () => {
      currentSearch = searchInput.value;
      applyFilters();
    });

    // button filter helper
    function setFilter(level) {
      currentFilter = level;
      applyFilters();
    }

    // initial render
    renderBooks(books);
